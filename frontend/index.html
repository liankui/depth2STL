<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>浮雕工坊</title>
    <link rel="stylesheet" href="/frontend/styles.css" />
  </head>
  <body>
    <main class="page">
      <section class="shell">
        <header class="header">
          <h1>浮雕工坊</h1>
          <p>上传原图，等待生成结果，完成后下载深度图与 STL。</p>
        </header>

        <div class="intro-notes">
          <p id="fileError" class="message error hidden"></p>
          <p id="statusMessage" class="message status-line">上传后会创建任务并持续查询状态。</p>
        </div>

        <form id="uploadForm" class="upload-form">
          <div class="frame-toolbar">
            <input id="uploadFile" type="file" accept="image/png,image/jpeg,image/webp" required />
            <input id="jobIdInput" type="hidden" />
          </div>
          <section class="settings-panel" aria-labelledby="settingsTitle">
            <div class="settings-head">
              <div>
                <p id="settingsTitle" class="settings-title">模型参数</p>
                <p class="settings-subtitle">上传后将和图片一起提交到创建任务接口。</p>
              </div>
              <span class="meta">可选，未填写使用默认值</span>
            </div>
            <div class="settings-grid">
              <label class="field">
                <span class="field-label">模型宽度</span>
                <div class="field-input">
                  <input id="modelWidthInput" name="modelWidth" type="number" min="1" step="0.1" value="50" />
                  <span class="field-unit">mm</span>
                </div>
              </label>
              <label class="field">
                <span class="field-label">模型高度</span>
                <div class="field-input">
                  <input id="modelThicknessInput" name="modelThickness" type="number" min="0.1" step="0.1" value="5" />
                  <span class="field-unit">mm</span>
                </div>
              </label>
              <label class="field">
                <span class="field-label">底座高度</span>
                <div class="field-input">
                  <input id="baseThicknessInput" name="baseThickness" type="number" min="0" step="0.1" value="2" />
                  <span class="field-unit">mm</span>
                </div>
              </label>
              <label class="field">
                <span class="field-label">精度档位</span>
                <div class="field-input field-input-select">
                  <select id="detailLevelInput" name="detailLevel">
                    <option value="1">1 · 普通</option>
                    <option value="2" selected>2 · 推荐</option>
                    <option value="3">3 · 高精度</option>
                  </select>
                </div>
              </label>
            </div>
            <div class="toggle-grid">
              <label class="toggle-card">
                <input id="skipConvInput" name="skipConv" type="checkbox" />
                <span class="toggle-indicator" aria-hidden="true"></span>
                <span class="toggle-copy">
                  <strong>跳过深度图处理</strong>
                  <span>直接使用上传图参与后续处理。</span>
                </span>
              </label>
              <label class="toggle-card">
                <input id="invertInput" name="invert" type="checkbox" />
                <span class="toggle-indicator" aria-hidden="true"></span>
                <span class="toggle-copy">
                  <strong>反转浮雕</strong>
                  <span>切换凸起和凹陷的方向。</span>
                </span>
              </label>
            </div>
          </section>
        </form>

        <section class="frame-grid">
          <article class="frame-card">
            <div class="frame-head">
              <h2>原图</h2>
              <div class="actions actions-with-status">
                <span id="fileMeta" class="meta">未选择文件</span>
                <button id="createJobBtn" type="submit" form="uploadForm" class="secondary">创建任务</button>
              </div>
            </div>
            <label id="sourceFrame" class="image-frame upload-frame" for="uploadFile">
              <img id="sourceImage" class="frame-image" alt="上传图片预览" />
              <div id="sourcePlaceholder" class="upload-placeholder">
                <span class="upload-anim" aria-hidden="true">
                  <span class="upload-anim-ring"></span>
                  <span class="upload-anim-core">
                    <svg viewBox="0 0 24 24" role="presentation">
                      <path d="M8.5 18.5h7.2a3.3 3.3 0 0 0 .5-6.6 4.8 4.8 0 0 0-9.3-1.2A3.7 3.7 0 0 0 8.5 18.5Z" />
                      <path d="M12 15.5V9" />
                      <path d="m9.6 11.4 2.4-2.4 2.4 2.4" />
                    </svg>
                  </span>
                </span>
                <strong>点击上传原图</strong>
                <span>建议使用主体清晰、边缘完整的图片</span>
              </div>
            </label>
          </article>

          <article class="frame-card">
            <div class="frame-head">
              <h2>生成图</h2>
              <div class="actions actions-with-status">
                <span id="jobStatusBadge" class="badge badge-idle">idle</span>
                <button id="downloadImageBtn" type="button" class="secondary" disabled>下载 image</button>
                <button id="downloadStlBtn" type="button" class="secondary" disabled>下载 STL</button>
              </div>
            </div>
            <div id="resultFrame" class="image-frame result-full-frame">
              <img id="previewImage" class="frame-image" alt="生成的 depth image 预览" />
              <p id="previewHint" class="placeholder">完成后显示生成图。</p>
            </div>
          </article>
        </section>
      </section>
    </main>

    <script src="/config.js"></script>
    <script src="/frontend/app.js"></script>
  </body>
</html>
