<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>depth2STL Relief Studio</title>
    <link rel="stylesheet" href="/frontend/styles.css" />
  </head>
  <body>
    <div class="bg-grid"></div>
    <main class="container">
      <header class="hero">
        <h1>Relief Studio</h1>
        <p>上传图片，自动生成浮雕深度图与 STL 文件，支持全流程状态追踪。</p>
        <div class="api-hint">API: <code>http://localhost:31101/v1</code></div>
      </header>

      <section class="workflow">
        <article class="step-card">
          <div class="step-header">
            <span class="step-number">1</span>
            <h2>上传图片并创建任务</h2>
          </div>
          <form id="uploadForm" class="step-content">
            <label class="upload-zone" for="uploadFile">
              <input id="uploadFile" type="file" accept="image/*" required />
              <span class="upload-title">点击选择图片</span>
              <span class="upload-subtitle">支持 jpg/png/webp</span>
            </label>
            <button id="uploadBtn" type="submit">生成 3D 浮雕任务</button>
          </form>
        </article>

        <article class="step-card">
          <div class="step-header">
            <span class="step-number">2</span>
            <h2>任务状态与控制</h2>
          </div>
          <div class="step-content">
            <div class="field">
              <label for="jobIdInput">jobId</label>
              <input id="jobIdInput" type="text" placeholder="上传后会自动填充，也可手动输入" />
            </div>
            <div class="row">
              <button id="queryJobBtn" type="button">查询状态</button>
              <button id="deleteJobBtn" type="button" class="danger">删除任务</button>
            </div>
            <div class="task-meta">
              <span>当前状态:</span>
              <span id="jobStatusBadge" class="status-badge status-idle">idle</span>
              <span id="pollingFlag" class="polling-flag">未轮询</span>
            </div>
          </div>
        </article>
      </section>

      <section class="result-card">
        <div class="result-header">
          <h2>生成结果</h2>
          <div class="row">
            <button id="downloadImageBtn" type="button" disabled>下载深度图</button>
            <button id="downloadStlBtn" type="button" disabled>下载 STL</button>
          </div>
        </div>
        <div class="image-grid">
          <div class="image-panel">
            <h3>原始图像</h3>
            <div class="preview-wrap">
              <img id="sourceImage" alt="原始图像预览" />
            </div>
          </div>
          <div class="image-panel">
            <h3>灰度深度图</h3>
            <div class="preview-wrap">
              <img id="previewImage" alt="任务生成的深度图预览" />
            </div>
          </div>
        </div>
        <p id="previewHint" class="hint">上传图片后会自动轮询任务状态并在完成后渲染结果。</p>
      </section>

      <section class="card queue-card">
        <h2>队列监控</h2>
        <div class="metrics" id="queueMetrics"></div>
        <div id="queueStatusDetail" class="queue-status-detail"></div>
        <div class="row">
          <button id="refreshQueueBtn" type="button">立即刷新</button>
          <label class="inline"><input id="autoRefresh" type="checkbox" checked /> 自动刷新 (5s)</label>
        </div>
      </section>

      <section class="card">
        <h2>任务历史</h2>
        <table>
          <thead>
            <tr>
              <th>jobId</th>
              <th>状态</th>
              <th>更新时间</th>
            </tr>
          </thead>
          <tbody id="historyBody"></tbody>
        </table>
      </section>

      <section class="card">
        <h2>运行日志</h2>
        <div id="log" class="log"></div>
      </section>
    </main>
    <script src="/frontend/config.js"></script>
    <script src="/frontend/app.js"></script>
  </body>
</html>
