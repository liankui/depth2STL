<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>depth2STL 控制台</title>
    <link rel="stylesheet" href="./styles.css" />
  </head>
  <body>
    <div class="bg-orb orb-a"></div>
    <div class="bg-orb orb-b"></div>
    <main class="container">
      <header class="hero">
        <h1>depth2STL 控制台</h1>
        <p>上传图片、查询任务、查看队列、下载 STL 与深度图。</p>
      </header>

      <section class="card">
        <h2>创建任务</h2>
        <form id="uploadForm" class="row">
          <input id="uploadFile" type="file" accept="image/*" required />
          <button id="uploadBtn" type="submit">上传并创建任务</button>
        </form>
      </section>

      <section class="card">
        <h2>任务操作</h2>
        <div class="row">
          <input id="jobIdInput" type="text" placeholder="输入 jobId" />
          <button id="queryJobBtn" type="button">查询任务</button>
          <button id="downloadImageBtn" type="button">下载图片</button>
          <button id="downloadStlBtn" type="button">下载 STL</button>
          <button id="deleteJobBtn" type="button" class="danger">删除任务</button>
        </div>
      </section>

      <section class="card">
        <h2>队列状态</h2>
        <div class="metrics" id="queueMetrics"></div>
        <div id="queueStatusDetail" class="queue-status-detail"></div>
        <div class="row">
          <button id="refreshQueueBtn" type="button">立即刷新</button>
          <label class="inline"><input id="autoRefresh" type="checkbox" checked /> 自动刷新 (5s)</label>
        </div>
      </section>

      <section class="card">
        <h2>任务预览</h2>
        <div class="preview-wrap">
          <img id="previewImage" alt="任务生成的深度图预览" />
        </div>
        <p id="previewHint" class="hint">任务完成后会自动显示生成图片。</p>
      </section>

      <section class="card">
        <h2>任务历史</h2>
        <table>
          <thead>
            <tr>
              <th>jobId</th>
              <th>状态</th>
              <th>更新时间</th>
            </tr>
          </thead>
          <tbody id="historyBody"></tbody>
        </table>
      </section>

      <section class="card">
        <h2>消息</h2>
        <div id="log" class="log"></div>
      </section>
    </main>
    <script src="./config.js"></script>
    <script src="./app.js"></script>
  </body>
</html>
